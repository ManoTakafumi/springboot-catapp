<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ユーザー登録</title>
    <link rel="stylesheet" th:href="@{/css/destyle.css}">
    <link rel="stylesheet" th:href="@{/css/style.css(v=1)}">
</head>
<body>

    <div class="container">

        <h2>ユーザー登録</h2>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div>
                ユーザー名: <input type="text" th:field="*{username}" />
            </div>
            <div>
                パスワード: <input type="password" th:field="*{password}" />
            </div>
            <button type="submit">登録</button>
        </form>

    </div>
</body>
</html>
