<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ログイン</title>
    <link rel="stylesheet" th:href="@{/css/destyle.css}">
    <link rel="stylesheet" th:href="@{/css/style.css(v=1)}">
</head>
<body>

    <div class="container">

        <h2>ログイン</h2>

        <form th:action="@{/login}" method="post">

            <div>
                ユーザー名:
                <input type="text" name="username" />
            </div>

            <div>
                パスワード:
                <input type="password" name="password" />
            </div>

            <button type="submit">
                ログイン
            </button>

        </form>

        <br>

        <p>
            アカウントをお持ちでない方は
            <a th:href="@{/register}">
                こちら
            </a>
        </p>

        <div th:if="${param.error}">
            <p style="color:red;">
                ユーザー名またはパスワードが違います
            </p>
        </div>

    </div>
</body>
</html>
