<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>猫登録</title>
    <link rel="stylesheet" th:href="@{/css/destyle.css}">
    <link rel="stylesheet" th:href="@{/css/style.css(v=1)}">
</head>
<body>

    <div class="container">

        <h2>猫を登録する</h2>

        <form th:action="@{/cats/new}" th:object="${cat}" method="post">

            <div>
                猫の名前：
                <input type="text" th:field="*{name}" />
            </div>

            <button type="submit">
                登録する
            </button>
        </form>
    </div>
</body>
</html>
