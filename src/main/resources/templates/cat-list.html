<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>猫一覧</title>
    <link rel="stylesheet" th:href="@{/css/destyle.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="cat-list-page">

    <div class="container">

        <h2>あなたの猫一覧</h2>

        <div th:if="${#lists.isEmpty(cats)}">
            <p>まだ猫が登録されていません。</p>
        </div>

        <h2 th:if="${!#lists.isEmpty(cats)}"
            th:text="${cats[0].name} + ' のようす'"></h2>

        <div th:each="cat : ${cats}">

            <div>
                <img th:id="'catImage_' + ${cat.id}" th:src="@{/images/wait.png}">
                <br>
                <span th:id="'catStatusText_' + ${cat.id}">
                        まったりしています
                    </span>
            </div>

            <!--            <div>-->
            <!--                <img alt="食べる">-->
            <!--                <br>ごはんを食べています-->
            <!--            </div>-->

            <!--            <div th:if="${cat.imageStatus == 'playing'}">-->
            <!--                <img th:src="@{/images/play.png}" alt="遊ぶ">-->
            <!--                <br>元気に遊んでいます-->
            <!--            </div>-->
        </div>

        <table border="1" th:if="${!#lists.isEmpty(cats)}">


            <thead>
            <tr>
                <th>名前</th>
                <th>レベル</th>
                <th>体力</th>
                <th>満腹度</th>
                <th>元気</th>
                <th>操作</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cat : ${cats}">
                <td th:text="${cat.name}"></td>
                <td>
                    <span th:id="'levelValue_' + ${cat.id}"
                          th:text="${cat.level}">
                    </span>
                </td>
                <td>
                    <span th:id="'staminaValue_' + ${cat.id}"
                          th:text="${cat.stamina}">
                    </span>
                </td>
                <td>
                    <span th:id="'hungerValue_' + ${cat.id}" th:text="${cat.hunger}"></span>
                </td>
                <td>
                    <span th:id="'energyValue_' + ${cat.id}" th:text="${cat.energy}"></span>
                </td>
                <td>
                    <button type="button" th:onclick="'feedCat(' + ${cat.id} + ')'">
                        ごはんをあげる
                    </button>

                    <button type="button"
                            th:onclick="'playCat(' + ${cat.id} + ')'">
                        遊ぶ
                    </button>
                    <button type="button"
                            th:onclick="'sleepCat(' + ${cat.id} + ')'">
                        寝る
                    </button>
                    <form th:action="@{/cats/{id}/delete(id=${cat.id})}" method="post" style="display:inline;">
                        <button type="submit" onclick="return confirm('本当に削除しますか？');">
                            削除
                        </button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>

        <br>

        <a th:href="@{/cats/new}">
            新しい猫を登録する
        </a>

    </div>

    <script th:inline="javascript">

        function feedCat(catId) {
            fetch('/cats/' + catId + '/feed', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {

                if (data.message) {
                    alert(data.message);
                }

                //満腹度更新
                document.getElementById("hungerValue_" + catId).innerText = data.hunger;
                document.getElementById("energyValue_" + catId).innerText = data.energy;
                document.getElementById("levelValue_" + catId).innerText = data.level;
                document.getElementById("staminaValue_" + catId).innerText = data.stamina;

                if (data.bonusMessage) {
                    alert(data.bonusMessage);
                }

                //画像更新
                if (data.imageStatus === "eating") {
                    document.getElementById("catImage_" + catId).src = "/images/eat.png";
                    document.getElementById("catStatusText_" + catId).innerText = "ごはんを食べています";
                }

                setTimeout(() => {
                    document.getElementById("catImage_" + catId).src = "/images/wait.png";
                    document.getElementById("catStatusText_" + catId).innerText = "まったりしています";
                }, 2500);

                if (data.actionBlocked) {
                    alert(data.message);

                    document.getElementById("catStatusText_" + catId).innerText = "疲れて動けない_";
                    return;
                }
            })
            .catch(error => {
                console.error('Error:', error);
            });
        }

        function playCat(catId) {
            fetch('/cats/' + catId + '/play', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {

                if (data.message) {
                    alert(data.message);
                }

                //元気度更新
                document.getElementById("hungerValue_" + catId).innerText = data.hunger;
                document.getElementById("energyValue_" + catId).innerText = data.energy;
                document.getElementById("levelValue_" + catId).innerText = data.level;
                document.getElementById("staminaValue_" + catId).innerText = data.stamina;

                if (data.bonusMessage) {
                    alert(data.bonusMessage);
                }

                if (data.imageStatus === "playing") {
                    document.getElementById("catImage_" + catId).src = "/images/play.png";
                    document.getElementById("catStatusText_" + catId).innerText = "元気に遊んでいます";
                }

                setTimeout(() => {
                    document.getElementById("catImage_" + catId).src = "/images/wait.png";
                    document.getElementById("catStatusText_" + catId).innerText = "まったりしています";
                }, 2500);

                if (data.actionBlocked) {
                    alert(data.message);
                    document.getElementById("catStatusText_" + catId).innerText = "疲れて動けない_";

                    return;
                }

            });
        }

        function sleepCat(catId) {
            fetch('/cats/' + catId + '/sleep', {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {

                document.getElementById("staminaValue_" + catId).innerText = data.stamina;

                if (data.imageStatus === "sleeping") {
                    document.getElementById("catImage_" + catId).src = "/images/sleep.png";
                    document.getElementById("catStatusText_" + catId).innerText = "ぐっすり寝ています";
                }

                if (data.bonusMessage) {
                    alert(data.bonusMessage);
                }

                setTimeout(() => {
                    document.getElementById("catImage_" + catId).src = "/images/wait.png";
                    document.getElementById("catStatusText_" + catId).innerText = "まったりしています";
                }, 2000);

            });
        }
    </script>
</body>
</html>
